{% if status == 'success' %}
<div class="alert alert-success" style="background: rgba(40, 167, 69, 0.8); border: 1px solid rgba(40, 167, 69, 1); color: white; border-radius: 10px; padding: 15px; margin: 20px 0;">
	<i class="fas fa-check-circle"></i> {{ message }}
</div>
{% elif status == 'error' %}
<div class="alert alert-danger" style="background: rgba(220, 53, 69, 0.8); border: 1px solid rgba(220, 53, 69, 1); color: white; border-radius: 10px; padding: 15px; margin: 20px 0;">
	<i class="fas fa-exclamation-triangle"></i> {{ message }}
</div>
{% endif %}
